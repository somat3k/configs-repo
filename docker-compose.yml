version: '3.9'

# Full MLS platform — all modules
# Infrastructure (Postgres, Redis, IPFS) lives in docker-compose.infra.yml.
# Always start infrastructure first, then start modules:
#
#   docker compose -f docker-compose.infra.yml up -d
#   docker compose up -d
#
# Or combine both files in a single command (creates a shared Compose project):
#
#   docker compose -f docker-compose.infra.yml -f docker-compose.yml up -d
#
# Note: depends_on only works within the same Compose file/project. Cross-file
# service dependencies (postgres, redis, ipfs) are listed as comments below
# each service instead of as depends_on entries.

networks:
  mls-network:
    external: true
    name: mls-network

services:
  block-controller:
    image: ghcr.io/somat3k/mls-block-controller:latest
    build:
      context: src/block-controller
      dockerfile: Dockerfile
    container_name: mls-block-controller
    restart: unless-stopped
    ports:
      - "5100:5100"
      - "6100:6100"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:5100
      - MLS_MODULE=block-controller
      - MLS_WS_PORT=6100
      - ConnectionStrings__Redis=redis:6379
      - ConnectionStrings__Postgres=Host=postgres;Port=5432;Database=mls_db;Username=mls_user;Password=${POSTGRES_PASSWORD}
    networks:
      - mls-network
    # Requires infra services: postgres, redis (start docker-compose.infra.yml first)
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5100/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    labels:
      com.mls.module: "block-controller"
      com.mls.role: "orchestrator"

  web-app:
    image: ghcr.io/somat3k/mls-web-app:latest
    build:
      # context: src/web-app — project not yet scaffolded; create src/web-app/Dockerfile first
      context: src/web-app
      dockerfile: Dockerfile
    container_name: mls-web-app
    restart: unless-stopped
    ports:
      - "5200:5200"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:5200
      - MLS_MODULE=web-app
      - MLS_BC_URL=http://block-controller:5100
    networks:
      - mls-network
    depends_on:
      - block-controller
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5200/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    labels:
      com.mls.module: "web-app"
      com.mls.role: "frontend"

  trader:
    image: ghcr.io/somat3k/mls-trader:latest
    build:
      context: src/modules/trader
      dockerfile: Dockerfile
    container_name: mls-trader
    restart: unless-stopped
    ports:
      - "5300:5300"
      - "6300:6300"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:5300
      - MLS_MODULE=trader
      - MLS_WS_PORT=6300
      - MLS_BC_URL=http://block-controller:5100
    networks:
      - mls-network
    depends_on:
      - block-controller
    labels:
      com.mls.module: "trader"
      com.mls.role: "algo-model"

  arbitrager:
    image: ghcr.io/somat3k/mls-arbitrager:latest
    build:
      context: src/modules/arbitrager
      dockerfile: Dockerfile
    container_name: mls-arbitrager
    restart: unless-stopped
    ports:
      - "5400:5400"
      - "6400:6400"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:5400
      - MLS_MODULE=arbitrager
      - MLS_WS_PORT=6400
      - MLS_BC_URL=http://block-controller:5100
    networks:
      - mls-network
    depends_on:
      - block-controller
    labels:
      com.mls.module: "arbitrager"
      com.mls.role: "algo-model"

  defi:
    image: ghcr.io/somat3k/mls-defi:latest
    build:
      context: src/modules/defi
      dockerfile: Dockerfile
    container_name: mls-defi
    restart: unless-stopped
    ports:
      - "5500:5500"
      - "6500:6500"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:5500
      - MLS_MODULE=defi
      - MLS_WS_PORT=6500
      - MLS_BC_URL=http://block-controller:5100
    networks:
      - mls-network
    depends_on:
      - block-controller
    labels:
      com.mls.module: "defi"
      com.mls.role: "algo-model"

  ml-runtime:
    image: ghcr.io/somat3k/mls-ml-runtime:latest
    build:
      context: src/modules/ml-runtime
      dockerfile: Dockerfile
    container_name: mls-ml-runtime
    restart: unless-stopped
    ports:
      - "5600:5600"
      - "6600:6600"
    environment:
      - MLS_MODULE=ml-runtime
      - MLS_WS_PORT=6600
      - MLS_BC_URL=http://block-controller:5100
      - IPFS_API_URL=http://ipfs:5001
    volumes:
      - ./artifacts/models:/app/models:ro
    networks:
      - mls-network
    # Requires infra service: ipfs (start docker-compose.infra.yml first)
    depends_on:
      - block-controller
    labels:
      com.mls.module: "ml-runtime"
      com.mls.role: "inference"

  data-layer:
    image: ghcr.io/somat3k/mls-data-layer:latest
    build:
      context: src/modules/data-layer
      dockerfile: Dockerfile
    container_name: mls-data-layer
    restart: unless-stopped
    ports:
      - "5700:5700"
      - "6700:6700"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:5700
      - MLS_MODULE=data-layer
      - MLS_WS_PORT=6700
      - MLS_BC_URL=http://block-controller:5100
      - ConnectionStrings__Redis=redis:6379
      - ConnectionStrings__Postgres=Host=postgres;Port=5432;Database=mls_db;Username=mls_user;Password=${POSTGRES_PASSWORD}
      - IPFS_API_URL=http://ipfs:5001
    networks:
      - mls-network
    # Requires infra services: postgres, redis, ipfs (start docker-compose.infra.yml first)
    depends_on:
      - block-controller
    labels:
      com.mls.module: "data-layer"
      com.mls.role: "data-access"

  broker:
    image: ghcr.io/somat3k/mls-broker:latest
    build:
      context: src/modules/broker
      dockerfile: Dockerfile
    container_name: mls-broker
    restart: unless-stopped
    ports:
      - "5800:5800"
      - "6800:6800"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:5800
      - MLS_MODULE=broker
      - MLS_WS_PORT=6800
      - MLS_BC_URL=http://block-controller:5100
      - ConnectionStrings__Redis=redis:6379
      - ConnectionStrings__Postgres=Host=postgres;Port=5432;Database=mls_db;Username=mls_user;Password=${POSTGRES_PASSWORD}
      - Broker__RedisConnectionString=redis:6379
      - Broker__PostgresConnectionString=Host=postgres;Port=5432;Database=mls_db;Username=mls_user;Password=${POSTGRES_PASSWORD}
      - Broker__BlockControllerUrl=http://block-controller:5100
      # HYPERLIQUID_WALLET_ADDRESS loaded from .env or Docker secrets — never hardcoded
    networks:
      - mls-network
    # Requires infra services: postgres, redis (start docker-compose.infra.yml first)
    depends_on:
      - block-controller
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5800/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    labels:
      com.mls.module: "broker"
      com.mls.role: "order-execution"

  shell-vm:
    image: ghcr.io/somat3k/mls-shell-vm:latest
    build:
      context: src/modules/shell-vm
      dockerfile: Dockerfile
    container_name: mls-shell-vm
    restart: unless-stopped
    ports:
      - "5950:5950"
      - "6950:6950"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:5950
      - MLS_MODULE=shell-vm
      - MLS_WS_PORT=6950
      - MLS_BC_URL=http://block-controller:5100
      - ConnectionStrings__Redis=redis:6379
      - ConnectionStrings__Postgres=Host=postgres;Port=5432;Database=mls_db;Username=mls_user;Password=${POSTGRES_PASSWORD}
      - ShellVM__BlockControllerUrl=http://block-controller:5100
      - ShellVM__RedisConnectionString=redis:6379
      - ShellVM__PostgresConnectionString=Host=postgres;Port=5432;Database=mls_db;Username=mls_user;Password=${POSTGRES_PASSWORD}
    networks:
      - mls-network
    # Requires infra services: postgres, redis (start docker-compose.infra.yml first)
    depends_on:
      - block-controller
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5950/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    labels:
      com.mls.module: "shell-vm"
      com.mls.role: "execution-console"

  unique-id-generator:
    image: ghcr.io/somat3k/mls-unique-id-generator:latest
    build:
      context: src/network-modules/unique-id-generator
      dockerfile: Dockerfile
    container_name: mls-unique-id-generator
    restart: unless-stopped
    ports:
      - "5010:5010"
      - "6010:6010"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:5010
      - MLS_MODULE=unique-id-generator
      - MLS_BC_URL=http://block-controller:5100
    networks:
      - mls-network
    depends_on:
      - block-controller
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5010/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    labels:
      com.mls.module: "unique-id-generator"
      com.mls.role: "infrastructure"

  task-id-generator:
    image: ghcr.io/somat3k/mls-task-id-generator:latest
    build:
      context: src/network-modules/task-id-generator
      dockerfile: Dockerfile
    container_name: mls-task-id-generator
    restart: unless-stopped
    ports:
      - "5011:5011"
      - "6011:6011"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:5011
      - MLS_MODULE=task-id-generator
      - MLS_BC_URL=http://block-controller:5100
    networks:
      - mls-network
    depends_on:
      - block-controller
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5011/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    labels:
      com.mls.module: "task-id-generator"
      com.mls.role: "infrastructure"

  subscription-manager:
    image: ghcr.io/somat3k/mls-subscription-manager:latest
    build:
      context: src/network-modules/subscription-manager
      dockerfile: Dockerfile
    container_name: mls-subscription-manager
    restart: unless-stopped
    ports:
      - "5012:5012"
      - "6012:6012"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:5012
      - MLS_MODULE=subscription-manager
      - MLS_BC_URL=http://block-controller:5100
    networks:
      - mls-network
    depends_on:
      - block-controller
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5012/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    labels:
      com.mls.module: "subscription-manager"
      com.mls.role: "infrastructure"

  mls-runtime:
    image: ghcr.io/somat3k/mls-runtime:latest
    build:
      context: src/network-modules/runtime
      dockerfile: Dockerfile
    container_name: mls-runtime
    restart: unless-stopped
    ports:
      - "5013:5013"
      - "6013:6013"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:5013
      - MLS_MODULE=runtime
      - MLS_BC_URL=http://block-controller:5100
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - mls-network
    depends_on:
      - block-controller
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5013/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    labels:
      com.mls.module: "runtime"
      com.mls.role: "infrastructure"

  virtual-machine:
    image: ghcr.io/somat3k/mls-virtual-machine:latest
    build:
      context: src/network-modules/virtual-machine
      dockerfile: Dockerfile
    container_name: mls-virtual-machine
    restart: unless-stopped
    ports:
      - "5014:5014"
      - "6014:6014"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:5014
      - MLS_MODULE=virtual-machine
      - MLS_BC_URL=http://block-controller:5100
    networks:
      - mls-network
    depends_on:
      - block-controller
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5014/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    labels:
      com.mls.module: "virtual-machine"
      com.mls.role: "infrastructure"

  container-registry:
    image: ghcr.io/somat3k/mls-container-registry:latest
    build:
      context: src/network-modules/container-registry
      dockerfile: Dockerfile
    container_name: mls-container-registry
    restart: unless-stopped
    ports:
      - "5015:5015"
      - "6015:6015"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:5015
      - MLS_MODULE=container-registry
      - MLS_BC_URL=http://block-controller:5100
    networks:
      - mls-network
    depends_on:
      - block-controller
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5015/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    labels:
      com.mls.module: "container-registry"
      com.mls.role: "infrastructure"

  network-mask:
    image: ghcr.io/somat3k/mls-network-mask:latest
    build:
      context: src/network-modules/network-mask
      dockerfile: Dockerfile
    container_name: mls-network-mask
    restart: unless-stopped
    ports:
      - "5016:5016"
      - "6016:6016"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:5016
      - MLS_MODULE=network-mask
      - MLS_BC_URL=http://block-controller:5100
    networks:
      - mls-network
    depends_on:
      - block-controller
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5016/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    labels:
      com.mls.module: "network-mask"
      com.mls.role: "infrastructure"
