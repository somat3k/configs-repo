# MLS Trading Platform — Redis Configuration
# Optimized for trading/cache workload

# Network
bind 0.0.0.0
port 6379
tcp-backlog 511
timeout 0
tcp-keepalive 300

# General
daemonize no
loglevel notice
databases 16

# Memory
maxmemory 2gb
maxmemory-policy allkeys-lru
maxmemory-samples 10
lazyfree-lazy-eviction yes
lazyfree-lazy-expire yes
lazyfree-lazy-server-del yes

# Persistence
save 900 1
save 300 10
save 60 10000
stop-writes-on-bgsave-error yes
rdbcompression yes
rdbchecksum yes
dbfilename dump.rdb
dir /data

# AOF
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec
no-appendfsync-on-rewrite no
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# Streams (for MLS event log)
stream-node-max-bytes 4096
stream-node-max-entries 100

# Slow log
slowlog-log-slower-than 10000
slowlog-max-len 128

# Security (passwords set via environment in production)
# requirepass your_password_here
