name: ML Runtime — Train & Export Models

on:
  workflow_dispatch:
    inputs:
      model_type:
        description: 'Model to train (model-t/model-a/model-d/all)'
        required: true
        default: 'all'
        type: choice
        options: [model-t, model-a, model-d, all]
      environment:
        description: 'Target environment'
        required: true
        default: 'staging'
        type: choice
        options: [staging, production]

env:
  PYTHON_VERSION: '3.12'
  ARTIFACTS_DIR: artifacts/models

jobs:
  train-models:
    name: Train & Export ML Models
    runs-on: ubuntu-latest
    permissions:
      contents: read
    # Skip until ml-runtime Python training scripts and requirements.lock are scaffolded
    if: hashFiles('src/modules/ml-runtime/requirements.lock') != ''
    strategy:
      matrix:
        model: ${{ fromJson(inputs.model_type == 'all' && '["model-t","model-a","model-d"]' || format('["{0}"]', inputs.model_type)) }}
      fail-fast: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install ML dependencies
        working-directory: src/modules/ml-runtime
        run: |
          pip install --upgrade pip
          pip install -r requirements.lock

      - name: Run training pipeline
        working-directory: src/modules/ml-runtime/scripts
        env:
          MODEL_TYPE: ${{ matrix.model }}
          MLS_ENV: ${{ inputs.environment || 'staging' }}
          MLS_ARTIFACTS_DIR: ${{ github.workspace }}/${{ env.ARTIFACTS_DIR }}
        run: |
          cat > /tmp/train_config.json <<EOF
          {
            "job_id": "${{ github.run_id }}-${{ matrix.model }}",
            "model_type": "${{ matrix.model }}",
            "feature_schema_version": 1,
            "hyperparams": {
              "epochs": 100,
              "batch_size": 512,
              "learning_rate": 0.001,
              "dropout_rate": 0.2,
              "hidden_dims": [128, 64, 32],
              "weight_decay": 1e-5,
              "warmup_steps": 500,
              "early_stopping_patience": 20
            }
          }
          EOF
          python training_pipeline.py --config /tmp/train_config.json

      - name: Run model validation tests
        working-directory: src/modules/ml-runtime
        continue-on-error: true
        run: |
          python -m pytest scripts/tests/test_${{ matrix.model }}_model.py -v \
            --benchmark-only \
            --benchmark-json=benchmark_${{ matrix.model }}.json

      - name: Upload model artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ml-models-${{ matrix.model }}-${{ github.run_number }}
          path: |
            ${{ env.ARTIFACTS_DIR }}/*.onnx
            ${{ env.ARTIFACTS_DIR }}/*.joblib
            src/modules/ml-runtime/benchmark_${{ matrix.model }}.json
          retention-days: 30

  validate-and-register:
    name: Validate & Register Models
    needs: train-models
    runs-on: ubuntu-latest
    permissions:
      contents: read
    if: success() && hashFiles('src/tools/ModelValidator/**') != ''

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all model artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: ml-models-*-${{ github.run_number }}
          merge-multiple: true
          path: artifacts/models

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Validate ONNX models
        run: |
          dotnet run --project src/tools/ModelValidator \
            --models-dir artifacts/models \
            --output validation-report.json

      - name: Upload validation report
        uses: actions/upload-artifact@v4
        with:
          name: model-validation-report-${{ github.run_number }}
          path: validation-report.json
          retention-days: 90
