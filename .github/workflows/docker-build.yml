name: Docker Build and Push

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      push_images:
        description: "Push images to GHCR"
        required: false
        default: "false"
        type: boolean

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}

jobs:
  build-images:
    name: Build Docker images
    runs-on: ubuntu-latest
    timeout-minutes: 90

    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        include:
          - name: mls-block-controller
            context: src/block-controller
          - name: mls-web-app
            context: src/web-app
          - name: mls-designer
            context: src/modules/designer
          - name: mls-trader
            context: src/modules/trader
          - name: mls-arbitrager
            context: src/modules/arbitrager
          - name: mls-defi
            context: src/modules/defi
          - name: mls-ml-runtime
            context: src/modules/ml-runtime
          - name: mls-data-layer
            context: src/modules/data-layer
          - name: mls-ai-hub
            context: src/modules/ai-hub
          - name: mls-broker
            context: src/modules/broker
          - name: mls-transactions
            context: src/modules/transactions
          - name: mls-shell-vm
            context: src/modules/shell-vm

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name == 'push' || inputs.push_images == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for ${{ matrix.name }}
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}/${{ matrix.name }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push ${{ matrix.name }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: ${{ github.event_name == 'push' || inputs.push_images == 'true' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
