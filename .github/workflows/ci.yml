name: CI — Build, Test & Lint

on:
  push:
    branches: [main, develop, 'feature/**', 'hotfix/**']
  pull_request:
    branches: [main, develop]

env:
  DOTNET_VERSION: '9.0.x'
  PYTHON_VERSION: '3.12'

jobs:
  build-and-test:
    name: Build & Test (.NET)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: mls_user
          POSTGRES_PASSWORD: mls_test_password
          POSTGRES_DB: mls_test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore MLS.sln

      - name: Build
        run: dotnet build MLS.sln --no-restore --configuration Release

      - name: Run unit tests
        run: |
          dotnet test MLS.sln \
            --no-build \
            --configuration Release \
            --logger "trx;LogFileName=test-results.trx" \
            --collect:"XPlat Code Coverage" \
            --results-directory ./TestResults \
            --filter "Category!=Integration"
        env:
          ConnectionStrings__Postgres: "Host=localhost;Port=5432;Database=mls_test_db;Username=mls_user;Password=mls_test_password"
          ConnectionStrings__Redis: "localhost:6379"

      - name: Run integration tests
        run: |
          dotnet test MLS.sln \
            --no-build \
            --configuration Release \
            --logger "trx;LogFileName=integration-results.trx" \
            --results-directory ./TestResults \
            --filter "Category=Integration"
        env:
          ConnectionStrings__Postgres: "Host=localhost;Port=5432;Database=mls_test_db;Username=mls_user;Password=mls_test_password"
          ConnectionStrings__Redis: "localhost:6379"

      - name: Generate coverage report
        uses: danielpalme/ReportGenerator-GitHub-Action@5.3.8
        with:
          reports: 'TestResults/**/*.xml'
          targetdir: 'TestResults/Coverage'
          reporttypes: 'Html;Badges;MarkdownSummaryGithub'

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-${{ github.run_number }}
          path: TestResults/
          retention-days: 30

      - name: Code coverage summary
        uses: irongut/CodeCoverageSummary@v1.3.0
        with:
          filename: TestResults/**/*.xml
          badge: true
          format: markdown
          output: file
          thresholds: '60 80'

  lint-dotnet:
    name: Lint (.NET Format)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - run: dotnet restore MLS.sln
      - run: dotnet format MLS.sln --verify-no-changes --severity warn

  lint-python:
    name: Lint (Python/Ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install ruff
        run: pip install ruff
      - name: Run ruff
        run: ruff check src/modules/ml-runtime/
      - name: Run ruff format check
        run: ruff format --check src/modules/ml-runtime/
