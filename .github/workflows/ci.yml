name: CI

on:
  push:
    branches: ["main", "develop", "copilot/**", "feature/**"]
  pull_request:
    branches: ["main", "develop"]

jobs:
  # ─── Rust ──────────────────────────────────────────────────────────────────
  rust:
    name: Rust — build & test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: fmt
        run: |
          if cargo metadata --no-deps --format-version 1 2>/dev/null | python3 -c "import json,sys; exit(0 if json.load(sys.stdin)['packages'] else 1)" 2>/dev/null; then
            cargo fmt --all -- --check
          else
            echo "No Rust workspace members found — skipping cargo fmt"
          fi
      - name: clippy
        run: |
          if cargo metadata --no-deps --format-version 1 2>/dev/null | python3 -c "import json,sys; exit(0 if json.load(sys.stdin)['packages'] else 1)" 2>/dev/null; then
            cargo clippy --all-targets --all-features -- -D warnings
          else
            echo "No Rust workspace members found — skipping cargo clippy"
          fi
      - name: test
        run: |
          if cargo metadata --no-deps --format-version 1 2>/dev/null | python3 -c "import json,sys; exit(0 if json.load(sys.stdin)['packages'] else 1)" 2>/dev/null; then
            cargo test --all --all-features
          else
            echo "No Rust workspace members found — skipping cargo test"
          fi

  # ─── Python ────────────────────────────────────────────────────────────────
  python:
    name: Python — lint & test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: install deps
        run: pip install -e ".[dev]"
      - name: ruff lint
        run: ruff check .
      - name: pytest
        run: pytest -v

  # ─── Solidity (Python / Ape Framework) ────────────────────────────────────
  solidity:
    name: Solidity — compile (Ape)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: install ape
        run: pip install eth-ape ape-solidity
      - name: compile contracts
        run: |
          if [ -d src/contracts ] && [ -n "$(ls src/contracts/*.sol 2>/dev/null)" ]; then
            ape compile
          else
            echo "No Solidity contracts found — skipping compile."
          fi

  # ─── Docker build check ────────────────────────────────────────────────────
  docker:
    name: Docker Compose — validate
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: validate compose
        run: docker compose -f infra/docker-compose.yml config --quiet
