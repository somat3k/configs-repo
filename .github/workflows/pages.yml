name: GitHub Pages — NuxtJS Documentation

on:
  push:
    branches: [main]
    paths:
      - 'nuxt-pages/**'
      - 'docs/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build NuxtJS Site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: nuxt-pages/package.json

      - name: Install dependencies
        working-directory: nuxt-pages
        run: npm install

      - name: Generate static site
        working-directory: nuxt-pages
        run: npm run generate
        env:
          NUXT_PUBLIC_SITE_URL: 'https://somat3k.github.io/configs-repo'

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: nuxt-pages/.output/public

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
