name: Package Distribution — NuGet & Docker

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Package version (e.g., 1.0.0-preview.1)'
        required: true
      publish_nuget:
        description: 'Publish NuGet packages'
        type: boolean
        default: true
      publish_docker:
        description: 'Publish Docker images'
        type: boolean
        default: true

env:
  DOTNET_VERSION: '9.0.x'
  NUGET_FEED: 'https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json'

jobs:
  pack-nuget:
    name: Pack & Publish NuGet Packages
    runs-on: ubuntu-latest
    # Skip until MLS.sln and project files are scaffolded
    if: inputs.publish_nuget != false && hashFiles('MLS.sln') != ''
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore & Build
        run: |
          dotnet restore MLS.sln
          dotnet build MLS.sln --no-restore --configuration Release

      - name: Pack NuGet packages
        run: |
          dotnet pack MLS.sln \
            --no-build \
            --configuration Release \
            --output ./nupkg \
            /p:PackageVersion=${{ inputs.version || github.event.release.tag_name }}

      - name: Push to GitHub Packages
        run: |
          dotnet nuget push "./nupkg/*.nupkg" \
            --source "${{ env.NUGET_FEED }}" \
            --api-key ${{ secrets.GITHUB_TOKEN }} \
            --skip-duplicate

      - name: Upload NuGet packages as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages-${{ inputs.version || github.event.release.tag_name }}
          path: ./nupkg/*.nupkg
          retention-days: 90
