name: "Session 01 — Core Block Contracts"

on:
  workflow_dispatch:

# No schedule trigger — production module, run manually only.

env:
  DOTNET_VERSION: "9.0.x"

jobs:
  build-and-test:
    name: "Build & Test — MLS.Core"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/MLS.Core/*.csproj', '**/MLS.Core.Tests/*.csproj') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Restore dependencies
        run: dotnet restore MLS.sln

      - name: Build (Release)
        run: dotnet build MLS.sln --no-restore --configuration Release

      - name: Run unit tests
        run: |
          dotnet test MLS.sln \
            --no-build \
            --configuration Release \
            --logger "trx;LogFileName=session-01-results.trx" \
            --collect:"XPlat Code Coverage" \
            --results-directory ./TestResults \
            --verbosity normal

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: session-01-test-results-${{ github.run_number }}
          path: TestResults/
          retention-days: 30

      - name: Generate coverage report
        uses: danielpalme/ReportGenerator-GitHub-Action@5.3.8
        with:
          reports: "TestResults/**/*.xml"
          targetdir: "TestResults/Coverage"
          reporttypes: "Html;MarkdownSummaryGithub"

      - name: Code coverage summary
        uses: irongut/CodeCoverageSummary@v1.3.0
        with:
          filename: TestResults/**/*.xml
          badge: true
          format: markdown
          output: both
          thresholds: "70 80"

      - name: Add coverage PR comment
        uses: marocchino/sticky-pull-request-comment@v2
        if: github.event_name == 'pull_request'
        with:
          recreate: true
          path: code-coverage-results.md

  lint:
    name: "Lint — dotnet format"
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - run: dotnet restore MLS.sln
      - run: dotnet format MLS.sln --verify-no-changes --severity warn
