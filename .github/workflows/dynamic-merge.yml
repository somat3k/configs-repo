name: Dynamic Merge

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled]
    branches: ["main", "develop"]

jobs:
  gate:
    name: Merge gate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check PR labels
        id: labels
        run: |
          LABELS='${{ toJson(github.event.pull_request.labels.*.name) }}'
          echo "labels=$LABELS" >> "$GITHUB_OUTPUT"
          if echo "$LABELS" | grep -q '"do-not-merge"'; then
            echo "blocked=true" >> "$GITHUB_OUTPUT"
          else
            echo "blocked=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Block merge if labelled
        if: steps.labels.outputs.blocked == 'true'
        run: |
          echo "PR is labelled 'do-not-merge'. Blocking." && exit 1

      - name: Require session notes
        run: |
          BASE="${{ github.event.pull_request.base.sha }}"
          HEAD="${{ github.event.pull_request.head.sha }}"
          if git diff --name-only "$BASE" "$HEAD" | grep -q "^sessions/.*/SESSION.md"; then
            echo "Session notes found ✓"
          else
            echo "::warning::No session notes committed. Add sessions/<id>/SESSION.md before merging."
          fi

  auto-merge:
    name: Auto-merge (squash)
    needs: gate
    runs-on: ubuntu-latest
    if: |
      github.event.pull_request.draft == false &&
      contains(github.event.pull_request.labels.*.name, 'auto-merge')
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Enable auto-merge
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.pulls.merge({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              merge_method: 'squash',
            });
